name: Update cleanup lock

on:
  push:
    branches:
      - cleanup/flake-structure-inputs

permissions:
  contents: write

jobs:
  update-lock:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Update inputs
        run: nix flake update --accept-flake-config
      - name: Evaluate and capture result
        id: validate
        continue-on-error: true
        run: nix flake check --no-build --accept-flake-config --show-trace > validation.log 2>&1
      - name: Commit generated state
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add flake.lock validation.log
          if ! git diff --cached --quiet; then
            git commit -m "chore: update flake inputs and capture validation"
            git push
          fi
      - name: Enforce validation result
        if: steps.validate.outcome != 'success'
        run: exit 1
