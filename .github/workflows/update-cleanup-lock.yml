name: Validate cleanup branch

on:
  push:
    branches:
      - cleanup/flake-structure-inputs

permissions:
  contents: write

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run Tend validation
        id: validate
        continue-on-error: true
        run: |
          base_sha="$(git merge-base HEAD origin/main)"
          head_sha="$(git rev-parse HEAD)"
          nix develop --accept-flake-config --command tend check \
            --profile ci \
            --context ci \
            --base "$base_sha" \
            --head "$head_sha" \
            > validation.log 2>&1
      - name: Commit validation output
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add validation.log
          if ! git diff --cached --quiet; then
            git commit -m "chore: capture Tend validation"
            git push
          fi
      - name: Enforce validation result
        if: steps.validate.outcome != 'success'
        run: exit 1
